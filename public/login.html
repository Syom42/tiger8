<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#141410">
<title>Tiger8 — כניסה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
input, button { font-family: 'Heebo', sans-serif; }

:root {
  --bg:      #141410;
  --surface:  #1c1c18;
  --surface-raised: #262620;
  --border:  rgba(237,233,222,0.1);
  --accent:  #3d8a5a;
  --accent-strong: #56b87c;
  --danger:  #c43535;
  --text:    #ede9de;
  --text2:   #b6b1a3;
  --text3:   #878370;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  padding: 24px 20px;
}

/* ── Brand ── */
.brand {
  text-align: center;
  margin-bottom: 28px;
}
.brand-icon {
  width: 58px;
  height: 58px;
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.2);
  overflow: hidden;
}
.brand-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.brand-name {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 0;
  color: var(--text);
}
.brand-tagline {
  font-size: 14px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 400;
}

/* ── Container ── */
.auth-wrap {
  width: 100%;
  max-width: 360px;
}

/* ── Segment control ── */
.seg {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 4px;
}
.seg-btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 5px;
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.seg-btn.active {
  background: var(--surface-raised);
  color: var(--text);
  box-shadow: inset 0 0 0 1px var(--border);
}

/* ── Forms ── */
.auth-form {
  display: none;
  flex-direction: column;
  gap: 14px;
}
.auth-form.active { display: flex; }

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.field input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 13px 14px;
  font-size: 15px;
  color: var(--text);
  direction: ltr;
  text-align: left;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
  appearance: none;
  -webkit-appearance: none;
}
.field input::placeholder { color: var(--text3); }
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(61,138,90,0.22);
}
.field input:focus:invalid { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(196,53,53,0.18); }

/* ── Submit btn ── */
.submit-btn {
  margin-top: 6px;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 6px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0;
  transition: opacity 0.15s ease, transform 0.1s ease, box-shadow 0.2s ease;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(61,138,90,0.22);
}
.submit-btn:hover { background: var(--accent-strong); }
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.submit-btn .spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  position: absolute;
  left: 50%;
  top: 50%;
  margin: -9px 0 0 -9px;
}
.submit-btn.loading .btn-text { opacity: 0; }
.submit-btn.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Message ── */
.auth-msg {
  min-height: 20px;
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  font-weight: 500;
  border-radius: 8px;
  padding: 0;
  transition: all 0.2s ease;
}
.auth-msg:not(:empty) { padding: 10px 14px; }
.auth-msg.err { background: rgba(196,53,53,0.12); color: #f0a3a3; border: 1px solid rgba(196,53,53,0.3); }
.auth-msg.ok  { background: rgba(61,138,90,0.15); color: #8ed1a4; border: 1px solid rgba(61,138,90,0.3); }

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider span {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

/* ── Google btn ── */
.google-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 13px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.google-btn:hover { background: var(--surface-raised); border-color: var(--text3); }
.google-btn:active { transform: scale(0.98); }
.google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ── Password requirements ── */
.pw-reqs {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-top: 6px;
}
.req {
  font-size: 12px;
  color: var(--text3);
  padding-right: 18px;
  position: relative;
  transition: color 0.15s ease;
}
.req::before {
  content: '✗';
  position: absolute;
  right: 0;
  color: var(--danger);
  font-size: 11px;
  font-weight: 700;
}
.req.ok { color: #6EE7B7; }
.req.ok::before { content: '✓'; color: #10B981; }

/* ── Footer ── */
.auth-footer {
  margin-top: 28px;
  text-align: center;
  font-size: 12px;
  color: var(--text3);
}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon"><img src="/tiger8-icon.png" alt="Tiger8"></div>
  <div class="brand-name">Tiger8</div>
  <div class="brand-tagline">שחרר את הנמר שבך</div>
</div>

<div class="auth-wrap">
  <div class="seg" role="tablist" aria-label="כניסה או הרשמה">
    <button class="seg-btn active" type="button" data-tab="login" role="tab" aria-selected="true">התחבר</button>
    <button class="seg-btn" type="button" data-tab="signup" role="tab" aria-selected="false">הירשם</button>
  </div>

  <form class="auth-form active" id="form-login" autocomplete="on" novalidate>
    <div class="field">
      <label for="login-email">אימייל</label>
      <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="login-password">סיסמה</label>
      <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="submit-btn">
      <span class="btn-text">התחבר</span>
      <span class="spinner"></span>
    </button>
  </form>

  <form class="auth-form" id="form-signup" autocomplete="on" novalidate>
    <div class="field">
      <label for="signup-email">אימייל</label>
      <input id="signup-email" type="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="signup-password">סיסמה</label>
      <input id="signup-password" type="password" placeholder="לפחות 8 תווים" required minlength="8" autocomplete="new-password">
      <ul class="pw-reqs" id="pw-reqs">
        <li id="req-len"  class="req">לפחות 8 תווים</li>
        <li id="req-upper" class="req">אות גדולה (A-Z)</li>
        <li id="req-lower" class="req">אות קטנה (a-z)</li>
        <li id="req-digit" class="req">ספרה (0-9)</li>
        <li id="req-special" class="req">תו מיוחד (!@#$%...)</li>
      </ul>
    </div>
    <button type="submit" class="submit-btn">
      <span class="btn-text">צור חשבון</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div class="auth-msg" id="auth-msg"></div>

  <div class="divider"><span>או</span></div>

  <a href="/api/auth/google" class="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    המשך עם Google
  </a>
</div>

<div class="auth-footer">Tiger8 &copy; 2026</div>

<script>
const msgEl = document.getElementById('auth-msg');

function setMsg(text, kind) {
  msgEl.textContent = text || '';
  msgEl.className = 'auth-msg' + (kind ? ' ' + kind : '');
}

function setLoading(btn, on) {
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

document.querySelectorAll('.seg-btn').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.seg-btn').forEach(x => {
      x.classList.remove('active');
      x.setAttribute('aria-selected', 'false');
    });
    document.querySelectorAll('.auth-form').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    t.setAttribute('aria-selected', 'true');
    document.getElementById('form-' + t.dataset.tab).classList.add('active');
    setMsg('');
  });
});

const ERRORS = {
  'invalid email':           'אימייל לא תקין',
  'password too weak':       'הסיסמה לא עומדת בדרישות',
  'email already registered':'אימייל זה כבר רשום',
  'invalid credentials':     'אימייל או סיסמה שגויים',
  'missing credentials':     'נא למלא אימייל וסיסמה',
  'use google login':        'חשבון זה נרשם דרך Google — השתמש בכפתור למטה',
};

async function postAuth(path, email, password, btn) {
  setLoading(btn, true);
  setMsg('');
  try {
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      setMsg(ERRORS[data.error] || data.error || 'משהו השתבש. נסה שוב.', 'err');
      return;
    }
    setMsg('מועבר לאפליקציה...', 'ok');
    window.location.href = '/';
  } catch {
    setMsg('שגיאת רשת. בדוק חיבור ונסה שוב.', 'err');
  } finally {
    setLoading(btn, false);
  }
}

document.getElementById('form-login').addEventListener('submit', e => {
  e.preventDefault();
  postAuth('/api/auth/login',
    document.getElementById('login-email').value.trim(),
    document.getElementById('login-password').value,
    e.target.querySelector('.submit-btn'));
});

document.getElementById('form-signup').addEventListener('submit', e => {
  e.preventDefault();
  postAuth('/api/auth/signup',
    document.getElementById('signup-email').value.trim(),
    document.getElementById('signup-password').value,
    e.target.querySelector('.submit-btn'));
});

const pwInput = document.getElementById('signup-password');
const checks = {
  'req-len':     v => v.length >= 8,
  'req-upper':   v => /[A-Z]/.test(v),
  'req-lower':   v => /[a-z]/.test(v),
  'req-digit':   v => /\d/.test(v),
  'req-special': v => /[!@#$%^&*()\-_=+[\]{};':",.<>/?\\|`~]/.test(v),
};
pwInput.addEventListener('input', () => {
  const v = pwInput.value;
  for (const [id, fn] of Object.entries(checks)) {
    document.getElementById(id).classList.toggle('ok', fn(v));
  }
});

fetch('/api/auth/me', { credentials: 'same-origin' })
  .then(r => { if (r.ok) window.location.href = '/'; })
  .catch(() => {});
</script>
</body>
</html>
