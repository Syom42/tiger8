<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0A0F1D">
<title>Tiger8 — כניסה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
input, button { font-family: 'Rubik', sans-serif; }

:root {
  --bg:      #0A0F1D;
  --bg2:     #131B2F;
  --bg3:     #1D2843;
  --border:  rgba(148,163,184,0.12);
  --accent:  #3B82F6;
  --accent2: #EF4444;
  --text:    #F8FAFC;
  --text2:   #94A3B8;
  --text3:   #64748B;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Rubik', sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  padding: 24px 20px;
}

/* ── Brand ── */
.brand {
  text-align: center;
  margin-bottom: 36px;
}
.brand-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--accent) 0%, #6366F1 100%);
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(59,130,246,0.3);
}
.brand-name {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.04em;
  color: var(--text);
}
.brand-tagline {
  font-size: 14px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 400;
}

/* ── Container ── */
.auth-wrap {
  width: 100%;
  max-width: 360px;
}

/* ── Segment control ── */
.seg {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}
.seg-btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text2);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.seg-btn.active {
  background: var(--bg3);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* ── Forms ── */
.auth-form {
  display: none;
  flex-direction: column;
  gap: 14px;
}
.auth-form.active { display: flex; }

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.field input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 14px;
  font-size: 15px;
  color: var(--text);
  direction: ltr;
  text-align: left;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
  -webkit-appearance: none;
}
.field input::placeholder { color: var(--text3); }
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.field input:focus:invalid { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(239,68,68,0.12); }

/* ── Submit btn ── */
.submit-btn {
  margin-top: 6px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: -0.01em;
  transition: opacity 0.15s ease, transform 0.1s ease;
  position: relative;
  overflow: hidden;
}
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.submit-btn .spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  position: absolute;
  left: 50%;
  top: 50%;
  margin: -9px 0 0 -9px;
}
.submit-btn.loading .btn-text { opacity: 0; }
.submit-btn.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Message ── */
.auth-msg {
  min-height: 20px;
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  font-weight: 500;
  border-radius: 8px;
  padding: 0;
  transition: all 0.2s ease;
}
.auth-msg:not(:empty) { padding: 10px 14px; }
.auth-msg.err { background: rgba(239,68,68,0.1); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.2); }
.auth-msg.ok  { background: rgba(16,185,129,0.1); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.2); }

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider span {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

/* ── Google btn ── */
.google-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 13px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg2);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s ease, border-color 0.15s ease;
}
.google-btn:hover { background: var(--bg3); border-color: var(--text3); }
.google-btn:active { transform: scale(0.98); }
.google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ── Footer ── */
.auth-footer {
  margin-top: 28px;
  text-align: center;
  font-size: 12px;
  color: var(--text3);
}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">🐯</div>
  <div class="brand-name">Tiger8</div>
  <div class="brand-tagline">שחרר את הנמר שבך</div>
</div>

<div class="auth-wrap">
  <div class="seg">
    <button class="seg-btn active" data-tab="login">התחבר</button>
    <button class="seg-btn" data-tab="signup">הירשם</button>
  </div>

  <form class="auth-form active" id="form-login" autocomplete="on" novalidate>
    <div class="field">
      <label for="login-email">אימייל</label>
      <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="login-password">סיסמה</label>
      <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="submit-btn">
      <span class="btn-text">התחבר</span>
      <span class="spinner"></span>
    </button>
  </form>

  <form class="auth-form" id="form-signup" autocomplete="on" novalidate>
    <div class="field">
      <label for="signup-email">אימייל</label>
      <input id="signup-email" type="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="signup-password">סיסמה</label>
      <input id="signup-password" type="password" placeholder="לפחות 6 תווים" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="submit-btn">
      <span class="btn-text">צור חשבון</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div class="auth-msg" id="auth-msg"></div>

  <div class="divider"><span>או</span></div>

  <a href="/api/auth/google" class="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    המשך עם Google
  </a>
</div>

<div class="auth-footer">Tiger8 &copy; 2026</div>

<script>
const msgEl = document.getElementById('auth-msg');

function setMsg(text, kind) {
  msgEl.textContent = text || '';
  msgEl.className = 'auth-msg' + (kind ? ' ' + kind : '');
}

function setLoading(btn, on) {
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

document.querySelectorAll('.seg-btn').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.seg-btn').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('form-' + t.dataset.tab).classList.add('active');
    setMsg('');
  });
});

const ERRORS = {
  'invalid email':           'אימייל לא תקין',
  'password too short':      'הסיסמה קצרה מדי — לפחות 6 תווים',
  'email already registered':'אימייל זה כבר רשום',
  'invalid credentials':     'אימייל או סיסמה שגויים',
  'missing credentials':     'נא למלא אימייל וסיסמה',
  'use google login':        'חשבון זה נרשם דרך Google — השתמש בכפתור למטה',
};

async function postAuth(path, email, password, btn) {
  setLoading(btn, true);
  setMsg('');
  try {
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      setMsg(ERRORS[data.error] || data.error || 'משהו השתבש. נסה שוב.', 'err');
      return;
    }
    setMsg('מועבר לאפליקציה...', 'ok');
    window.location.href = '/';
  } catch {
    setMsg('שגיאת רשת. בדוק חיבור ונסה שוב.', 'err');
  } finally {
    setLoading(btn, false);
  }
}

document.getElementById('form-login').addEventListener('submit', e => {
  e.preventDefault();
  postAuth('/api/auth/login',
    document.getElementById('login-email').value.trim(),
    document.getElementById('login-password').value,
    e.target.querySelector('.submit-btn'));
});

document.getElementById('form-signup').addEventListener('submit', e => {
  e.preventDefault();
  postAuth('/api/auth/signup',
    document.getElementById('signup-email').value.trim(),
    document.getElementById('signup-password').value,
    e.target.querySelector('.submit-btn'));
});

fetch('/api/auth/me', { credentials: 'same-origin' })
  .then(r => { if (r.ok) window.location.href = '/'; })
  .catch(() => {});
</script>
</body>
</html>
